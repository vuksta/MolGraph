name: molgraph
channels:
  - pyg
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # PyTorch — CPU-only by default.
  # For an NVIDIA GPU: remove `cpuonly`, add `pytorch-cuda=12.1` (match your driver),
  # and add `nvidia` to the channels list above.
  - pytorch
  - torchvision
  - torchaudio
  - cpuonly

  # PyTorch Geometric (core — from the `pyg` channel)
  # pytorch-scatter/sparse/cluster are intentionally omitted: the conda builds require
  # CUDA libs even in CPU-only setups. GCNConv and GATConv work correctly without them.
  - pyg

  # Chemistry / featurization
  - rdkit

  # Core data / ML stack
  - numpy
  - pandas
  - scikit-learn
  - matplotlib
  - seaborn
  - tqdm

  # Notebook support
  - jupyter
  - jupyterlab
  - ipykernel
  - ipywidgets

  # Spyder IDE
  - spyder
  - spyder-kernels
